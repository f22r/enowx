root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -tags dev -o ./tmp/enowx ./cmd/enowx"
  bin = "./tmp/enowx"
  # `start -f` runs the server in the foreground so air can manage/restart it —
  # without -f the CLI would try to daemonize (and bail if another instance's PID
  # file exists).
  full_bin = "ENOWX_PORT=1431 ENOWX_LOG_LEVEL=debug ENOWX_VITE_URL=http://127.0.0.1:5174 ./tmp/enowx start -f"
  include_ext = ["go"]
  exclude_dir = ["web", "server/webdist", "tmp", "bin"]
  delay = 400

[misc]
  clean_on_exit = true
